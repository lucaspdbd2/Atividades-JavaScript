
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Search</title>
</head>
<body>
    <h1>GitHub User Search</h1>
    <input type="text" id="searchInput" placeholder="Enter GitHub username">
    <button id="searchButton">Search</button>
    <ul id="results"></ul>  

    <script>
        document.getElementById('searchButton').addEventListener('click', function() {
            const query = document.getElementById('searchInput').value;
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = ''; // Clear previous results

            fetch(`https://api.github.com/search/users?q=${query}`)
                .then(response => response.json())
                .then(data => {
                    if (data.items.length > 0) {
                        data.items.forEach(user => {
                            const listItem = document.createElement('li');
                            listItem.textContent = user.login;
                            resultsContainer.appendChild(listItem);
                        });
                    } else {
                        resultsContainer.textContent = 'Não foram encontrados usuários para esta pesquisa';
                    }
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    resultsContainer.textContent = 'Ocorreu um erro ao buscar os usuários.';
                });
        });
    </script>
</body>
</html>
